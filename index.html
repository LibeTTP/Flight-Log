<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#100d08"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="flight log"/>
<title>flight log</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23100d08'/><polygon points='16,4 28,16 16,28 4,16' fill='none' stroke='%23d4a24e' stroke-width='2.5'/><polygon points='16,8 24,16 16,24 8,16' fill='%23d4a24e' opacity='0.35'/></svg>"/>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#0c0a07;color:#e8e0d0;font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,button,select{font-family:inherit}
input[type="date"],input[type="time"],input[type="number"],input[type="email"],input[type="password"]{color-scheme:dark}

/* ── AUTH ─────────────────────────────────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#0c0a07}
.auth-card{width:100%;max-width:360px;display:flex;flex-direction:column;gap:0}
.auth-logo{text-align:center;padding:0 0 32px}
.auth-logo-mark{width:56px;height:56px;border:1.5px solid rgba(212,162,78,.5);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:22px;color:#d4a24e;margin-bottom:16px}
.auth-logo-name{font-family:'Instrument Serif',serif;font-size:32px;font-style:italic;color:#f0e9d8;display:block}
.auth-logo-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#5a5248;margin-top:4px;display:block}
.auth-panel{background:#13100c;border:1px solid #262017;padding:28px}
.auth-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid #262017}
.auth-tab{flex:1;background:none;border:none;color:#5a5248;padding:10px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;position:relative;transition:color .15s}
.auth-tab.active{color:#d4a24e}
.auth-tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:#d4a24e}
.auth-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.auth-field label{display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#5a5248;margin-bottom:8px}
.auth-field input{width:100%;background:#0a0806;border:1px solid #262017;color:#e8e0d0;padding:13px 14px;font-size:14px;outline:none;transition:border-color .15s;border-radius:0}
.auth-field input:focus{border-color:#d4a24e}
.auth-field input::placeholder{color:#3a3530}
.auth-error{color:#e05a3a;background:#180d08;border-left:2px solid #e05a3a;padding:10px 14px;font-size:11px;margin-bottom:14px}
.auth-msg{color:#d4a24e;background:#151008;border-left:2px solid #d4a24e;padding:10px 14px;font-size:11px;margin-bottom:14px}
.btn-auth{background:#d4a24e;border:none;color:#0c0a07;padding:14px;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.25em;text-transform:uppercase;width:100%;transition:background .15s}
.btn-auth:hover{background:#e0b060}
.btn-auth:disabled{background:#3a2e18;color:#5a4a28;cursor:not-allowed}
.auth-footer{text-align:center;padding-top:16px}
.auth-footer button{background:none;border:none;color:#3a3530;font-size:10px;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;padding:8px;transition:color .15s}
.auth-footer button:hover{color:#a89f8c}

/* ── LAYOUT ───────────────────────────────────────────────────── */
.app-wrap{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.header{background:#0c0a07;border-bottom:1px solid #1e1a12;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:'Instrument Serif',serif;font-size:22px;font-style:italic;color:#f0e9d8;line-height:1;display:flex;align-items:center;gap:8px}
.brand-mark{width:28px;height:28px;border:1.5px solid rgba(212,162,78,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#d4a24e;flex-shrink:0}
.header-right{display:flex;align-items:center;gap:10px}
.sync-indicator{width:6px;height:6px;border-radius:50%;background:#3a3530;flex-shrink:0;transition:background .3s}
.sync-indicator.syncing{background:#d4a24e;animation:pulse 1s infinite}
.sync-indicator.ok{background:#4a8a4a}
.sync-indicator.error{background:#e05a3a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:none;border:none;color:#4a4540;font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;transition:color .15s}
.btn-logout:hover{color:#d4a24e}

/* Main scroll area */
.content{flex:1;overflow-y:auto;padding:0 0 80px;-webkit-overflow-scrolling:touch}
.page{padding:20px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── BOTTOM TAB BAR ───────────────────────────────────────────── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#0f0d09;border-top:1px solid #1e1a12;display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tabbar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 7px;background:none;border:none;cursor:pointer;transition:color .15s;color:#4a4540;min-width:0}
.tabbar-item.active{color:#d4a24e}
.tabbar-icon{font-size:18px;line-height:1}
.tabbar-label{font-size:8px;letter-spacing:.06em;text-transform:uppercase;line-height:1;white-space:nowrap}
.tabbar-item.active .tabbar-label{color:#d4a24e}
.tabbar-add{background:#d4a24e;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:#0c0a07;font-size:24px;font-weight:300;box-shadow:0 6px 20px rgba(212,162,78,.5);border:none;cursor:pointer;transition:transform .15s,background .15s;flex-shrink:0}
.tabbar-add:active{transform:scale(.92)}
.tabbar-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;position:relative}
.tabbar-center .tabbar-add{position:absolute;top:-44px}

/* ── GLOBE ────────────────────────────────────────────────────── */
#globe{width:100%;height:calc(100vh - 140px);height:calc(100dvh - 140px);overflow:hidden;background:#030201;position:relative;cursor:grab;touch-action:none}
#globe:active{cursor:grabbing}
#globe canvas{display:block}
.globe-hint{position:absolute;bottom:16px;left:16px;color:#3a3530;font-size:9px;letter-spacing:.15em;text-transform:uppercase;pointer-events:none;z-index:5}
.globe-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#d4a24e;font-size:10px;letter-spacing:.25em;text-transform:uppercase;z-index:3}

/* Airport tooltip */
.airport-info{position:absolute;background:#13100cee;border:1px solid #3a3020;padding:14px 16px;color:#e8e0d0;pointer-events:none;z-index:20;backdrop-filter:blur(12px);box-shadow:0 8px 32px #0008;max-width:220px;display:none;transform:translate(-50%,calc(-100% - 16px));line-height:1.5}
.airport-info.visible{display:block}
.airport-info-iata{color:#d4a24e;font-weight:600;font-size:13px;letter-spacing:.2em}
.airport-info-city{font-family:'Instrument Serif',serif;font-size:18px;color:#f0e9d8;font-style:italic;margin-top:2px}
.airport-info-name{color:#5a5248;font-size:10px;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.airport-info-visits{color:#d4a24e;font-size:9px;margin-top:8px;padding-top:8px;border-top:1px solid #262017;letter-spacing:.1em;text-transform:uppercase}
.airport-info::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#3a3020}

/* ── STATS STRIP (on globe page) ─────────────────────────────── */
.stats-strip{display:flex;overflow-x:auto;scrollbar-width:none;gap:1px;background:#1e1a12;border-top:1px solid #1e1a12;border-bottom:1px solid #1e1a12}
.stats-strip::-webkit-scrollbar{display:none}
.strip-stat{background:#0c0a07;padding:14px 20px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.strip-val{font-family:'Instrument Serif',serif;font-size:22px;color:#f0e9d8;font-style:italic;line-height:1}
.strip-val .u{color:#d4a24e;font-size:12px;margin-left:2px}
.strip-lbl{font-size:9px;color:#5a5248;text-transform:uppercase;letter-spacing:.15em}

/* ── FLIGHT LIST ──────────────────────────────────────────────── */
.flight-card{background:#13100c;border:1px solid #1e1a12;padding:16px;margin-bottom:1px;transition:background .12s;position:relative}
.flight-card:active{background:#17140e}
.flight-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.flight-card-num{color:#d4a24e;font-size:12px;letter-spacing:.15em;font-weight:600}
.flight-card-date{color:#5a5248;font-size:10px;letter-spacing:.08em}
.flight-card-route{display:flex;align-items:center;gap:0}
.route-ap{flex:1}
.route-ap-code{font-family:'Instrument Serif',serif;font-size:34px;color:#f0e9d8;font-weight:400;line-height:1;letter-spacing:-.01em}
.route-ap-city{font-size:10px;color:#5a5248;text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.route-ap-time{font-size:12px;color:#8a8078;margin-top:2px}
.route-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 8px}
.route-mid-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,#3a3020,transparent);position:relative}
.route-mid-line::after{content:'›';position:absolute;right:-4px;top:-8px;color:#d4a24e;font-size:14px}
.route-mid-dur{font-size:9px;color:#d4a24e;letter-spacing:.1em;text-transform:uppercase}
.route-ap-right{text-align:right}
.flight-card-footer{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid #1e1a12;align-items:center}
.fmeta{display:flex;flex-direction:column;gap:2px}
.fmeta-val{font-size:12px;color:#a89f8c;letter-spacing:.05em}
.fmeta-lbl{font-size:9px;color:#4a4540;text-transform:uppercase;letter-spacing:.1em}
.fmeta-delay{color:#e07040}
.btn-del{margin-left:auto;background:none;border:none;color:#3a3530;font-size:16px;cursor:pointer;padding:4px 8px;transition:color .15s;line-height:1}
.btn-del:hover{color:#e05a3a}

/* ── SORT BAR ─────────────────────────────────────────────────── */
.sort-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #1e1a12;background:#0c0a07;position:sticky;top:0;z-index:5}
.sort-count{font-size:10px;color:#5a5248;text-transform:uppercase;letter-spacing:.15em}
.sort-count strong{color:#d4a24e}
.sort-select{background:transparent;border:1px solid #262017;color:#8a8078;padding:5px 10px;font-size:10px;letter-spacing:.08em;outline:none}

/* ── STATS PAGE ───────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#1e1a12;border:1px solid #1e1a12;margin-bottom:1px}
.stat{background:#0c0a07;padding:20px 16px;display:flex;flex-direction:column;gap:6px}
.stat-value{font-family:'Instrument Serif',serif;font-size:30px;font-style:italic;color:#f0e9d8;line-height:1}
.stat-value .unit{color:#d4a24e;font-size:13px;margin-left:3px}
.stat-label{font-size:9px;color:#5a5248;text-transform:uppercase;letter-spacing:.15em}

.section-card{background:#13100c;border:1px solid #1e1a12;padding:20px;margin-bottom:1px}
.section-title{font-size:9px;color:#5a5248;text-transform:uppercase;letter-spacing:.2em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #1e1a12}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bar-iata{color:#d4a24e;font-size:11px;letter-spacing:.1em;width:36px;font-weight:600}
.bar-container{flex:1}
.bar-city{font-family:'Instrument Serif',serif;font-style:italic;font-size:13px;color:#a89f8c;margin-bottom:4px}
.bar-track{background:#1e1a12;height:3px}
.bar-fill{background:#d4a24e;height:100%}
.bar-count{color:#e8e0d0;font-size:11px;width:20px;text-align:right}
.chip{background:#13100c;border:1px solid #1e1a12;padding:7px 12px;display:inline-block}
.chip-code{color:#d4a24e;font-size:11px;letter-spacing:.1em}
.chip-count{color:#5a5248;font-size:10px;margin-left:8px}

/* ── FORM ─────────────────────────────────────────────────────── */
.form-section{background:#13100c;border:1px solid #1e1a12;padding:20px;margin-bottom:1px}
.form-title{font-family:'Instrument Serif',serif;font-size:20px;font-style:italic;color:#f0e9d8;margin-bottom:20px}
.form-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.form-field{flex:1;min-width:110px}
.form-field label{display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#5a5248;margin-bottom:7px}
.form-field input{width:100%;background:#0a0806;border:1px solid #262017;color:#e8e0d0;padding:12px;font-size:14px;outline:none;transition:border-color .15s}
.form-field input:focus{border-color:#d4a24e}
.form-field input::placeholder{color:#3a3530}
.form-preview{background:#0a0806;border-left:2px solid #d4a24e;padding:11px 14px;color:#d4a24e;font-size:11px;margin-bottom:14px;letter-spacing:.03em}
.form-preview strong{color:#f0e9d8}
.form-error{color:#e05a3a;background:#150a08;border-left:2px solid #e05a3a;padding:10px 14px;font-size:11px;margin-bottom:14px}
.btn-submit{background:#d4a24e;border:none;color:#0c0a07;padding:15px;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.25em;text-transform:uppercase;width:100%;transition:background .15s;margin-top:6px}
.btn-submit:hover{background:#e0b060}
.suggestions{position:absolute;top:100%;left:0;right:0;background:#13100c;border:1px solid #262017;z-index:50;box-shadow:0 8px 24px #000a;max-height:220px;overflow-y:auto;margin-top:2px}
.suggestion{padding:10px 12px;cursor:pointer;display:flex;gap:10px;font-size:11px;border-bottom:1px solid #1a1710}
.suggestion:last-child{border-bottom:none}
.suggestion:hover,.suggestion:active{background:#1a1710}
.suggestion-iata{color:#d4a24e;font-weight:600;width:38px;letter-spacing:.1em}
.suggestion-city{color:#8a8078}

/* ── EMPTY ────────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 24px;color:#5a5248}
.empty-icon{font-size:36px;margin-bottom:16px;opacity:.5}
.empty-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:#8a8078;margin-bottom:8px}
.empty-sub{font-size:11px;letter-spacing:.05em;line-height:1.6}
.btn-empty{display:inline-block;margin-top:20px;background:none;border:1px solid #d4a24e;color:#d4a24e;padding:10px 24px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-empty:hover{background:#d4a24e;color:#0c0a07}

/* ── REWARDS ──────────────────────────────────────────────────── */
.rewards-header{padding:20px;border-bottom:1px solid #1e1a12;display:flex;align-items:baseline;gap:10px}
.rewards-count{font-family:'Instrument Serif',serif;font-size:36px;font-style:italic;color:#d4a24e}
.rewards-total{font-size:11px;color:#5a5248;letter-spacing:.1em}
.rewards-section{margin-bottom:0}
.rewards-section-title{font-size:9px;color:#5a5248;text-transform:uppercase;letter-spacing:.2em;padding:14px 20px 10px;background:#0c0a07;border-bottom:1px solid #1e1a12;position:sticky;top:0;z-index:2}
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:#1e1a12;margin-bottom:1px}
.badge{background:#0c0a07;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;position:relative;transition:background .15s}
.badge.unlocked{background:#100e08}
.badge.unlocked::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,162,78,.08) 0%,transparent 65%);pointer-events:none}
.badge.locked{opacity:.4}
.badge-icon{font-size:26px;line-height:1}
.badge-name{font-family:'Instrument Serif',serif;font-size:13px;font-style:italic;color:#f0e9d8;line-height:1.2}
.badge.locked .badge-name{color:#5a5248}
.badge-desc{color:#5a5248;font-size:9px;letter-spacing:.06em;text-transform:uppercase;line-height:1.4}
.badge-progress{width:100%;background:#1e1a12;height:2px;margin-top:2px}
.badge-progress-fill{background:#d4a24e;height:100%;transition:width .5s cubic-bezier(.4,0,.2,1)}
.badge-check{position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;background:#d4a24e;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0c0a07;font-weight:700}

/* ── PASSPORT ─────────────────────────────────────────────────── */
.passport-wrap{max-width:420px;margin:0 auto;padding-bottom:24px}
.passport-share-btn{display:block;width:100%;background:none;border:1px solid #262017;color:#5a5248;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:11px;cursor:pointer;margin-bottom:20px;transition:all .15s}
.passport-share-btn:hover{border-color:#d4a24e;color:#d4a24e}
.passport{background:#4a1942;color:#f5e6c8;font-family:'JetBrains Mono',monospace;position:relative;overflow:hidden;box-shadow:0 20px 60px #00000099;display:flex;flex-direction:column}
.passport.golden{background:linear-gradient(160deg,#2a1f00 0%,#1a1400 40%,#2a1f00 100%);box-shadow:0 20px 80px rgba(212,162,78,.4)}
.passport.golden::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,0,.06) 0%,transparent 50%,rgba(255,215,0,.04) 100%);pointer-events:none}
.passport.golden .passport-cover{border-bottom-color:rgba(212,162,78,.4)}
.passport.golden .passport-emblem{border-color:rgba(212,162,78,.9);background:rgba(212,162,78,.15);color:#d4a24e;box-shadow:0 0 24px rgba(212,162,78,.25)}
.passport.golden .passport-title{color:rgba(212,162,78,.8)}
.passport.golden .passport-name{color:#f5d878}
.passport.golden .passport-subtitle{color:rgba(212,162,78,.6)}
.passport.golden .passport-stat-row{border-bottom-color:rgba(212,162,78,.12)}
.passport.golden .passport-stat-label{color:rgba(212,162,78,.55)}
.passport.golden .passport-stat-value{color:#f5d878}
.passport.golden .passport-stat-unit{color:rgba(212,162,78,.65)}
.passport.golden .passport-stamp{border-color:rgba(212,162,78,.4);color:rgba(212,162,78,.85)}
.passport.golden .passport-mrz{color:rgba(212,162,78,.4);border-top-color:rgba(212,162,78,.15)}
.passport-legend-badge{display:inline-block;background:linear-gradient(90deg,#b8860b,#d4a24e,#ffd700,#d4a24e,#b8860b);background-size:200% auto;color:#1a1000;font-size:9px;letter-spacing:.25em;text-transform:uppercase;padding:4px 12px;font-weight:700;animation:shimmer 2s linear infinite;margin-top:6px}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.passport::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(212,162,78,.07) 0%,transparent 50%),repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(212,162,78,.02) 18px,rgba(212,162,78,.02) 19px);pointer-events:none}
.passport-cover{padding:32px 28px 22px;border-bottom:1px solid rgba(212,162,78,.2);display:flex;flex-direction:column;align-items:center;gap:10px}
.passport-emblem{width:50px;height:50px;border:1.5px solid rgba(212,162,78,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(212,162,78,.75)}
.passport-title{font-family:'Instrument Serif',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(212,162,78,.6);text-align:center}
.passport-name{font-family:'Instrument Serif',serif;font-size:24px;font-style:italic;color:#f5e6c8;text-align:center}
.passport-subtitle{font-size:8px;letter-spacing:.2em;color:rgba(212,162,78,.45);text-transform:uppercase}
.passport-body{flex:1;padding:18px 24px}
.passport-stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid rgba(212,162,78,.08)}
.passport-stat-row:last-of-type{border-bottom:none}
.passport-stat-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(212,162,78,.45)}

function haversine(lat1,lon1,lat2,lon2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function estimateDur(km){let s;if(km<300)s=500;else if(km<800)s=680;else if(km<2500)s=790;else if(km<6000)s=850;else s=870;return Math.round((km/s)*60)+25;}
function calcDur(dep,arr){if(!dep||!arr)return null;const[dh,dm]=dep.split(":").map(Number),[ah,am]=arr.split(":").map(Number);let m=(ah*60+am)-(dh*60+dm);if(m<0)m+=1440;return m;}
function gcPts(lat1,lon1,lat2,lon2,n){n=n||80;const r=d=>d*Math.PI/180,g=r=>r*180/Math.PI;const f1=r(lat1),l1=r(lon1),f2=r(lat2),l2=r(lon2);const d=2*Math.asin(Math.sqrt(Math.sin((f2-f1)/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin((l2-l1)/2)**2));if(d===0)return[[lat1,lon1]];const pts=[];for(let i=0;i<=n;i++){const t=i/n,A=Math.sin((1-t)*d)/Math.sin(d),B=Math.sin(t*d)/Math.sin(d);const x=A*Math.cos(f1)*Math.cos(l1)+B*Math.cos(f2)*Math.cos(l2);const y=A*Math.cos(f1)*Math.sin(l1)+B*Math.cos(f2)*Math.sin(l2);const z=A*Math.sin(f1)+B*Math.sin(f2);pts.push([g(Math.atan2(z,Math.sqrt(x*x+y*y))),g(Math.atan2(y,x))]);}return pts;}

class Globe {
  constructor(container) {
    this.container = container; this.overlays = []; this.airportMeshes = []; this.rotVel = {x:0,y:0}; this.dragging = false; this.zoom = 2.8;
    this._init();
  }
  _init() {
    const W=this.container.clientWidth, H=this.container.clientHeight;
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45,W/H,0.1,1000);
    this.camera.position.z = this.zoom;
    this.renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
    this.renderer.setSize(W,H); this.renderer.setPixelRatio(Math.min(devicePixelRatio,2)); this.renderer.setClearColor(0,0);
    this.container.appendChild(this.renderer.domElement);
    this.scene.add(new THREE.AmbientLight(0xffffff,0.4));
    const sun=new THREE.DirectionalLight(0xffffff,0.8); sun.position.set(5,3,5); this.scene.add(sun);
    const mat=new THREE.MeshPhongMaterial({color:0x1a3050,specular:new THREE.Color(0x2a4a6a),shininess:8});
    const loader=new THREE.TextureLoader(); loader.crossOrigin="anonymous";
    const urls=["https://unpkg.com/three-globe@2.41.7/example/img/earth-blue-marble.jpg","https://cdn.jsdelivr.net/npm/three-globe@2.41.7/example/img/earth-blue-marble.jpg","https://unpkg.com/three-globe@2.41.7/example/img/earth-dark.jpg"];
    const tryLoad=i=>{if(i>=urls.length){document.getElementById("globe-loading")&&document.getElementById("globe-loading").remove();return;}loader.load(urls[i],tex=>{mat.map=tex;mat.color=new THREE.Color(0xffffff);mat.needsUpdate=true;document.getElementById("globe-loading")&&document.getElementById("globe-loading").remove();},undefined,()=>tryLoad(i+1));};
    tryLoad(0);
    this.globe=new THREE.Mesh(new THREE.SphereGeometry(1,96,96),mat); this.globe.rotation.y = -1.734; this.globe.rotation.x = 0.655; this.scene.add(this.globe);
    const atmMat=new THREE.ShaderMaterial({vertexShader:"varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",fragmentShader:"varying vec3 vN;void main(){float i=pow(0.7-dot(vN,vec3(0,0,1)),3.5);gl_FragColor=vec4(0.83,0.63,0.30,1.0)*i;}",blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true});
    this.scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.025,96,96),atmMat));
    const sv=[];for(let i=0;i<4000;i++){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=80+Math.random()*20;sv.push(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));}
    const sg=new THREE.BufferGeometry(); sg.setAttribute("position",new THREE.Float32BufferAttribute(sv,3));
    this.scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.15,transparent:true,opacity:0.8})));
    this._setupInteraction(); this._animate();
  }
  _setupInteraction() {
    const dom=this.renderer.domElement; let prev={x:0,y:0},dn={x:0,y:0},moved=false;
    const onDown=(x,y)=>{this.dragging=true;prev={x,y};dn={x,y};moved=false;this.rotVel={x:0,y:0};};
    const onMove=(x,y)=>{if(!this.dragging)return;if(Math.hypot(x-dn.x,y-dn.y)>5)moved=true;const dx=x-prev.x,dy=y-prev.y;this.globe.rotation.y+=dx*0.003;this.globe.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,this.globe.rotation.x+dy*0.003));this.rotVel={x:dy*0.003,y:dx*0.003};prev={x,y};};
    const onUp=(x,y)=>{if(this.dragging&&!moved&&x!==undefined)this._pick(x,y);else if(moved)hideAirportInfo();this.dragging=false;};
    dom.addEventListener("mousedown",e=>onDown(e.clientX,e.clientY));
    window.addEventListener("mousemove",e=>onMove(e.clientX,e.clientY));
    window.addEventListener("mouseup",e=>onUp(e.clientX,e.clientY));
    dom.addEventListener("wheel",e=>{e.preventDefault();this.zoom=Math.max(1.4,Math.min(8,this.zoom+e.deltaY*0.002));this.camera.position.z=this.zoom;},{passive:false});
    let pinch=null;
    dom.addEventListener("touchstart",e=>{if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch={dist:Math.hypot(dx,dy),zoom:this.zoom};this.dragging=false;}},{passive:true});
    dom.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===1&&!pinch)onMove(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2&&pinch){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;this.zoom=Math.max(1.4,Math.min(8,pinch.zoom*(pinch.dist/Math.hypot(dx,dy))));this.camera.position.z=this.zoom;}},{passive:false});
    dom.addEventListener("touchend",e=>{const t=e.changedTouches[0];onUp(t&&t.clientX,t&&t.clientY);pinch=null;});
    window.addEventListener("resize",()=>this.resize());
  }
  _animate(){
    this._raf=requestAnimationFrame(()=>this._animate());
    if(!this.dragging){this.globe.rotation.y+=this.rotVel.y*0.92;this.globe.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,this.globe.rotation.x+this.rotVel.x*0.92));this.rotVel.x*=0.92;this.rotVel.y*=0.92;}
    this.renderer.render(this.scene,this.camera);
  }
  resize(){if(!this.container.isConnected)return;const W=this.container.clientWidth,H=this.container.clientHeight;this.camera.aspect=W/H;this.camera.updateProjectionMatrix();this.renderer.setSize(W,H);}
  _ll(lat,lon,r){r=r||1;const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));}
  setFlights(flights) {
    this.overlays.forEach(o=>this.globe.remove(o)); this.overlays=[]; this.airportMeshes=[];
    const visited=new Set(flights.flatMap(f=>[f.origin,f.destination]));
    const pickGeo=new THREE.SphereGeometry(0.028,8,8),pickMat=new THREE.MeshBasicMaterial({visible:false});
    Object.entries(AIRPORTS).forEach(([iata,ap])=>{
      if(!visited.has(iata))return;
      const ring=new THREE.Mesh(new THREE.SphereGeometry(0.012,12,12),new THREE.MeshBasicMaterial({color:0xffffff}));
      ring.position.copy(this._ll(ap.lat,ap.lon,1.003)); this.globe.add(ring); this.overlays.push(ring);
      const dot=new THREE.Mesh(new THREE.SphereGeometry(0.009,12,12),new THREE.MeshBasicMaterial({color:0xd4a24e}));
      dot.position.copy(this._ll(ap.lat,ap.lon,1.008)); this.globe.add(dot); this.overlays.push(dot);
      const glow=new THREE.Mesh(new THREE.SphereGeometry(0.020,12,12),new THREE.MeshBasicMaterial({color:0xd4a24e,transparent:true,opacity:0.25}));
      glow.position.copy(this._ll(ap.lat,ap.lon,1.005)); this.globe.add(glow); this.overlays.push(glow);
      const pick=new THREE.Mesh(pickGeo,pickMat); pick.position.copy(this._ll(ap.lat,ap.lon,1.005)); pick.userData.iata=iata;
      this.globe.add(pick); this.overlays.push(pick); this.airportMeshes.push(pick);
    });
    const rc={};
    flights.forEach(f=>{const k=[f.origin,f.destination].sort().join("-");rc[k]=(rc[k]||0)+1;});
    Object.entries(rc).forEach(([key,count])=>{
      const[a,b]=key.split("-"),ap1=AIRPORTS[a],ap2=AIRPORTS[b]; if(!ap1||!ap2)return;
      const pts=gcPts(ap1.lat,ap1.lon,ap2.lat,ap2.lon,80),arcPts=[];
      for(let i=0;i<pts.length;i++){const t=i/(pts.length-1),h=Math.sin(Math.PI*t)*0.04;arcPts.push(this._ll(pts[i][0],pts[i][1],1.01+h));}
      const op=Math.min(0.9+count*0.05,1);
      [0,0.0015,-0.0015,0.0008,-0.0008].forEach((off,i)=>{
        const ps=arcPts.map(p=>p.clone().normalize().multiplyScalar(p.length()+off));
        const g=new THREE.BufferGeometry().setFromPoints(ps);
        const m=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:i===0?op:op*0.5});
        const l=new THREE.Line(g,m); this.globe.add(l); this.overlays.push(l);
      });
    });
  }
  _pick(cx,cy){
    const rect=this.renderer.domElement.getBoundingClientRect();
    const mouse=new THREE.Vector2(((cx-rect.left)/rect.width)*2-1,-((cy-rect.top)/rect.height)*2+1);
    const rc=new THREE.Raycaster(); rc.setFromCamera(mouse,this.camera);
    const hits=rc.intersectObjects(this.airportMeshes,false); if(!hits.length){hideAirportInfo();return;}
    const front=hits.filter(h=>{const wp=new THREE.Vector3();h.object.getWorldPosition(wp);return wp.normalize().dot(new THREE.Vector3().subVectors(this.camera.position,h.point).normalize())>0;});
    if(!front.length){hideAirportInfo();return;}
    showAirportInfo(front[0].object.userData.iata,cx,cy);
  }
}

async function submitAuth() {
  const btn = document.getElementById("auth-btn");
  const msg = document.getElementById("auth-msg");
  const email = (document.getElementById("auth-email")||{}).value||"";
  const pass = (document.getElementById("auth-pass")||{}).value||"";
  if (!email) { msg.innerHTML = '<div class="auth-error">Inserisci la tua email</div>'; return; }
  btn.disabled = true; btn.textContent = "..."; msg.innerHTML = "";
  try {
    if (state.authTab === "reset") {
      await supa.resetPassword(email);
      msg.innerHTML = '<div class="auth-msg">Email inviata! Controlla la casella e clicca il link per reimpostare la password.</div>';
      btn.disabled = false; btn.textContent = "Invia email reset"; return;
    }
    if (!pass) { msg.innerHTML = '<div class="auth-error">Inserisci la password</div>'; btn.disabled=false; btn.textContent=state.authTab==="login"?"Accedi":"Crea account"; return; }
    if (state.authTab === "signup") {
      msg.innerHTML = '<div class="auth-msg" style="color:#a89f8c">Contatto Supabase...</div>';
      const r = await fetch(SUPA_URL + "/auth/v1/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
        body: JSON.stringify({ email, password: pass })
      });
      const d = await r.json();
      msg.innerHTML = '<div class="auth-msg" style="color:#a89f8c;font-size:10px;word-break:break-all">Risposta: ' + JSON.stringify(d).slice(0,300) + '</div>';
      if (d.error || d.msg) throw new Error(d.error_description || d.error || d.msg || "Errore registrazione");
      msg.innerHTML = '<div class="auth-msg">Registrazione avvenuta! Controlla la tua email e clicca il link per confermare l\'account, poi accedi.</div>';
      btn.disabled = false; btn.textContent = "Crea account"; return;
    }
    await supa.signIn(email, pass);
    state.user = supa._user;
    await loadFlights();
    state.tab = "map";
    render();
  } catch(e) {
    msg.innerHTML = '<div class="auth-error">ERRORE: ' + e.message + '</div>';
    btn.disabled = false; btn.textContent = state.authTab === "login" ? "Accedi" : "Crea account";
  }
}

  const dur=dh!==null?(dh+"h "+String(dm).padStart(2,"0")+"m"+(f.durationEstimated?" ~":"")):"";

    '<div class="flight-card-header">'+
      '<div><div class="flight-card-num">'+(f.flightNum||"&#8212;")+'</div>'+(f.airline?'<div style="font-size:9px;color:#5a5248;letter-spacing:.05em;margin-top:2px">'+f.airline+'</div>':'')+  '</div>'+

function calcUnlockedCount(totalKm, totalMin, airports, countries) {
  const totalHours = totalMin / 60;
  const totalFlights = state.flights.length;
  const CONTINENT = {IT:"EU",ES:"EU",GB:"EU",FR:"EU",NL:"EU",DE:"EU",CH:"EU",AT:"EU",BE:"EU",IE:"EU",GR:"EU",TR:"EU",PT:"EU",DK:"EU",SE:"EU",NO:"EU",FI:"EU",PL:"EU",CZ:"EU",HU:"EU",RO:"EU",BG:"EU",RS:"EU",HR:"EU",CY:"EU",EG:"AF",TN:"AF",DZ:"AF",MA:"AF",ZA:"AF",KE:"AF",TZ:"AF",ET:"AF",NG:"AF",GH:"AF",IL:"AS",JO:"AS",AE:"AS",QA:"AS",KW:"AS",BH:"AS",OM:"AS",IN:"AS",LK:"AS",MV:"AS",NP:"AS",MY:"AS",TH:"AS",SG:"AS",HK:"AS",ID:"AS",PH:"AS",VN:"AS",JP:"AS",KR:"AS",TW:"AS",CN:"AS",AU:"OC",NZ:"OC",FJ:"OC",US:"AM",CA:"AM",MX:"AM",BR:"AM",CL:"AM",AR:"AM",CO:"AM",PE:"AM"};
  const vc = new Set(state.flights.flatMap(f=>[AIRPORTS[f.origin],AIRPORTS[f.destination]]).filter(Boolean).map(ap=>CONTINENT[ap.country]).filter(Boolean));
  const ISLAND_AP = new Set(["PMI","IBZ","MYK","JTR","CFU","RHO","HER","MLE","DPS","MNL","NAN","OOL","OLB","CAG","CTA","PMO","OKA","CJU","TPE","HKG","MFM","SIN"]);
  const islandV = new Set(state.flights.flatMap(f=>[f.origin,f.destination]).filter(i=>ISLAND_AP.has(i))).size;
  const LOWCOST = new Set(["FR","U2","W6","V7","PC","XQ","AK","DY"]);
  const lcf = state.flights.filter(f=>{ if(!f.flightNum||f.flightNum.length<2)return false; return LOWCOST.has(f.flightNum.replace(/[0-9]/g,"").toUpperCase().slice(0,2)); }).length;
  const rc={};state.flights.forEach(f=>{const k=[f.origin,f.destination].sort().join("-");rc[k]=(rc[k]||0)+1;});
  const maxR=Math.max(0,...Object.values(rc));
  const earlyF=state.flights.filter(f=>f.depTime&&parseInt(f.depTime.split(":")[0])<6).length;
  const lateF=state.flights.filter(f=>f.depTime&&parseInt(f.depTime.split(":")[0])>=0&&parseInt(f.depTime.split(":")[0])<4).length;
  const shortF=state.flights.filter(f=>f.durationMin&&f.durationMin<=45&&!f.durationEstimated).length;
  const longF=state.flights.filter(f=>f.durationMin&&f.durationMin>=600).length;
  const cnt=state.flights.flatMap(f=>[f.origin,f.destination]).reduce((a,x)=>{a[x]=(a[x]||0)+1;return a;},{});
  const maxAP=Math.max(0,...Object.values(cnt).map(Number));
  const checks = [
    totalKm>=1000, totalKm>=10000, totalKm>=50000, totalKm>=100000, totalKm>=250000,
    totalHours>=10, totalHours>=50, totalHours>=100, totalHours>=250, totalHours>=500,
    totalFlights>=1, totalFlights>=10, totalFlights>=25, totalFlights>=50, totalFlights>=100,
    vc.has("EU")&&vc.has("AF"), vc.has("AS"), vc.has("AM"), vc.size>=5, vc.size>=6,
    earlyF>=1, lateF>=1, shortF>=1, longF>=1, maxR>=5, lcf>=5, islandV>=5, airports.size>=10, maxAP>=10
  ];
  return checks.filter(Boolean).length;
}

  const routes=new Set(state.flights.map(f=>[f.origin,f.destination].sort().join("-"))).size;
  const flags=[...new Set(state.flights.flatMap(f=>[AIRPORTS[f.origin]&&AIRPORTS[f.origin].country,AIRPORTS[f.destination]&&AIRPORTS[f.destination].country].filter(Boolean)))].map(c=>FLAG[c]||"").filter(Boolean);
  const stamps=[...new Set(state.flights.flatMap(f=>[f.origin,f.destination]))].slice(0,16);
  const pad=(s,n)=>String(s).toUpperCase().replace(/[^A-Z0-9]/g,"<").padEnd(n,"<").slice(0,n);

  // Check if all badges unlocked for golden mode

  const isGolden = unlockedBadges >= totalBadges;
  const passportClass = "passport" + (isGolden ? " golden" : "");
  const bgColor = isGolden ? "#1a1400" : "#4a1942";
  const subtitle = isGolden ? "Legendary Traveller &middot; All Badges Unlocked" : "Personal Travel Document &middot; Non ufficiale";

  return'<div class="passport-wrap"><button class="passport-share-btn" onclick="sharePassport()">Salva immagine / Condividi</button><div class="'+passportClass+'" id="passport-card"><div class="passport-cover"><div class="passport-emblem">&#9674;</div><div class="passport-title">Flight Log &middot; Passaporto Personale</div><div class="passport-name">flight log</div><div class="passport-subtitle">'+subtitle+'</div>'+(isGolden?'<div class="passport-legend-badge">&#9733; Legend &#9733;</div>':'')+  '</div><div class="passport-body"><div class="passport-stat-row"><span class="passport-stat-label">Voli effettuati</span><span class="passport-stat-value">'+state.flights.length+'<span class="passport-stat-unit">voli</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Distanza percorsa</span><span class="passport-stat-value">'+Math.round(totalKm).toLocaleString("it-IT")+'<span class="passport-stat-unit">km</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Tempo in volo</span><span class="passport-stat-value">'+th+'h '+String(tm).padStart(2,"0")+'m</span></div><div class="passport-stat-row"><span class="passport-stat-label">Aeroporti visitati</span><span class="passport-stat-value">'+airports.size+'<span class="passport-stat-unit">scali</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Paesi attraversati</span><span class="passport-stat-value">'+countries.size+'<span class="passport-stat-unit">paesi</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Rotte uniche</span><span class="passport-stat-value">'+routes+'<span class="passport-stat-unit">rotte</span></span></div><div class="passport-countries"><div class="passport-countries-label">Paesi visitati</div><div class="passport-flags">'+flags.join(" ")+'</div></div><div class="passport-stamps"><div class="passport-stamps-label">Scali</div><div class="passport-stamp-grid">'+stamps.map(i=>'<div class="passport-stamp">'+i+'</div>').join("")+'</div></div></div><div class="passport-mrz">'+("P<FLT"+pad("FLIGHT LOG",39))+'<br>'+(pad(state.flights.length+"VLI",9)+"0"+pad(Math.round(totalKm)+"KM",6)+"0"+pad(airports.size+"APT",6)+"0"+pad(countries.size+"CTR",14))+'</div></div></div>';
}

function renderForm(){
  return'<div class="form-section"><div class="form-title">Nuovo volo</div><div class="form-row"><div class="form-field"><label>Origine &#9733;</label><input id="f-origin" placeholder="MXP" autocomplete="off" oninput="airportAC(this,\'origin\')" /><div id="sug-origin"></div></div><div class="form-field"><label>Destinazione &#9733;</label><input id="f-destination" placeholder="MAD" autocomplete="off" oninput="airportAC(this,\'destination\')" /><div id="sug-destination"></div></div></div><div id="preview" style="display:none" class="form-preview"></div><div class="form-row"><div class="form-field"><label>Decollo</label><input type="time" id="f-depTime" oninput="updatePreview()" /></div><div class="form-field"><label>Atterraggio</label><input type="time" id="f-arrTime" oninput="updatePreview()" /></div><div class="form-field"><label>Ritardo (min)</label><input type="number" min="0" id="f-delay" placeholder="0" /></div></div><div class="form-row"><div class="form-field"><label>N&#xB0; Volo</label><input id="f-flightNum" placeholder="AZ203" oninput="detectAirline(this.value)" /></div><div class="form-field"><label>Aeromobile</label><input id="f-aircraft" placeholder="A320" /></div><div class="form-field" style="flex:2"><label>Compagnia</label><input id="f-airline" placeholder="ITA Airways" /></div></div><div class="form-field"><label>Note</label><input id="f-note" placeholder="Sedile finestrino, turbolenza..." /></div><div id="form-error"></div><button class="btn-submit" onclick="submitFlight()">Registra volo</button></div>';
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function showAirportInfo(iata,cx,cy){
  const ap=AIRPORTS[iata];if(!ap)return;
  const el=document.getElementById("airport-info"),container=document.getElementById("globe");
  if(!el||!container)return;
  const rect=container.getBoundingClientRect();
  const visits=state.flights.filter(f=>f.origin===iata||f.destination===iata).length;
  const dep=state.flights.filter(f=>f.origin===iata).length,arr=state.flights.filter(f=>f.destination===iata).length;
  el.innerHTML='<div class="airport-info-iata">'+(FLAG[ap.country]||"")+" "+iata+'</div><div class="airport-info-city">'+ap.city+'</div><div class="airport-info-name">'+ap.name+'</div>'+(visits>0?'<div class="airport-info-visits">'+visits+' '+(visits===1?"volo":"voli")+' &middot; '+dep+' out &middot; '+arr+' in</div>':'<div class="airport-info-visits" style="color:#4a463d">Mai visitato</div>');
  el.style.left=(cx-rect.left)+"px"; el.style.top=(cy-rect.top)+"px"; el.classList.add("visible");
}
function hideAirportInfo(){const el=document.getElementById("airport-info");if(el)el.classList.remove("visible");}

function setTab(t){state.tab=t;if(globe&&globe.renderer.domElement.parentNode)globe.renderer.domElement.remove();renderApp();}
function setSortBy(v){state.sortBy=v;renderApp();}

async function doDeleteFlight(id){
  if(!confirm("Eliminare questo volo?"))return;
  setSync("syncing");
  try{ await supa.deleteFlight(id); state.flights=state.flights.filter(f=>f.id!==id); setSync("ok"); renderApp(); }
  catch(e){ setSync("error"); alert("Errore eliminazione: "+e.message); }
}

function airportAC(input,field){
  const q=input.value.toUpperCase(),sug=document.getElementById("sug-"+field);
  if(q.length<2){sug.innerHTML="";updatePreview();return;}
  const m=Object.entries(AIRPORTS).filter(([iata,ap])=>iata.includes(q)||ap.city.toUpperCase().includes(q)||ap.name.toUpperCase().includes(q)).slice(0,6);
  if(!m.length){sug.innerHTML="";return;}
  sug.innerHTML='<div class="suggestions">'+m.map(([iata,ap])=>'<div class="suggestion" onmousedown="selAP(\''+field+'\',\''+iata+'\')" ontouchstart="selAP(\''+field+'\',\''+iata+'\')"><span class="suggestion-iata">'+iata+'</span><span class="suggestion-city">'+(FLAG[ap.country]||"")+" "+ap.city+" &mdash; "+ap.name+'</span></div>').join("")+'</div>';
  updatePreview();
}
function selAP(field,iata){document.getElementById("f-"+field).value=iata;document.getElementById("sug-"+field).innerHTML="";updatePreview();}
function detectAirline(fn){const d=airlineFromFN(fn),el=document.getElementById("f-airline");if(d&&el&&!el.value)el.value=d;}
function updatePreview(){
  const orig=document.getElementById("f-origin")&&document.getElementById("f-origin").value.toUpperCase();
  const dest=document.getElementById("f-destination")&&document.getElementById("f-destination").value.toUpperCase();
  const dep=document.getElementById("f-depTime")&&document.getElementById("f-depTime").value;
  const arr=document.getElementById("f-arrTime")&&document.getElementById("f-arrTime").value;
  const prev=document.getElementById("preview");if(!prev)return;
  const ap1=AIRPORTS[orig],ap2=AIRPORTS[dest];
  if(ap1&&ap2&&orig!==dest){const km=Math.round(haversine(ap1.lat,ap1.lon,ap2.lat,ap2.lon)),manual=calcDur(dep,arr),est=estimateDur(km),durStr=manual?(Math.floor(manual/60)+"h "+String(manual%60)+"m"):("~"+Math.floor(est/60)+"h "+String(est%60)+'m <span style="color:#6b6558">(stima)</span>');prev.style.display="block";prev.innerHTML="<strong>"+km.toLocaleString("it-IT")+"</strong> km &middot; "+ap1.city+" &rarr; "+ap2.city+" &middot; <strong>"+durStr+"</strong>";}
  else prev.style.display="none";
}
function setupAddForm(){document.addEventListener("click",e=>{if(!e.target.closest(".form-field"))document.querySelectorAll(".suggestions").forEach(s=>s.remove());});}

async function submitFlight(){
  const g=id=>document.getElementById(id)&&document.getElementById(id).value;
  const orig=(g("f-origin")||"").toUpperCase(),dest=(g("f-destination")||"").toUpperCase();
  const err=document.getElementById("form-error");err.innerHTML="";
  if(!orig||!dest){err.innerHTML='<div class="form-error">Partenza e arrivo sono obbligatori</div>';return;}
  const ap1=AIRPORTS[orig],ap2=AIRPORTS[dest];
  if(!ap1){err.innerHTML='<div class="form-error">Aeroporto "'+orig+'" non trovato</div>';return;}
  if(!ap2){err.innerHTML='<div class="form-error">Aeroporto "'+dest+'" non trovato</div>';return;}
  const dep=g("f-depTime")||"",arr=g("f-arrTime")||"",manual=calcDur(dep,arr),dist=Math.round(haversine(ap1.lat,ap1.lon,ap2.lat,ap2.lon));
  const flight={id:Date.now(),flightNum:(g("f-flightNum")||"").toUpperCase(),date:new Date().toISOString().slice(0,10),origin:orig,destination:dest,depTime:dep,arrTime:arr,delay:parseInt(g("f-delay"))||0,aircraft:(g("f-aircraft")||"").toUpperCase(),airline:g("f-airline")||"",note:g("f-note")||"",distanceKm:dist,durationMin:manual||estimateDur(dist),durationEstimated:!manual};
  setSync("syncing");
  try{ await supa.insertFlight(flight); state.flights.unshift(flight); setSync("ok"); setTab("list"); }
  catch(e){ setSync("error"); err.innerHTML='<div class="form-error">Errore salvataggio: '+e.message+'</div>'; }
}

async function sharePassport() {
  const card = document.getElementById("passport-card");
  if (!card) return;

  const btn = document.querySelector(".passport-share-btn");
  if (btn) { btn.textContent = "Generando immagine..."; btn.disabled = true; }

  // Load html2canvas if not already loaded
  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  try {
    const canvas = await window.html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: card.classList.contains("golden") ? "#1a1400" : "#4a1942",
      logging: false,
    });

    const dataUrl = canvas.toDataURL("image/png");

    if (btn) { btn.textContent = "Salva immagine / Condividi"; btn.disabled = false; }

    // Try native share with file (iOS/Android)
    if (navigator.share && navigator.canShare) {
      canvas.toBlob(async blob => {
        const file = new File([blob], "flight-log-passport.png", { type: "image/png" });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: "flight log — passaporto personale" });
            return;
          } catch(e) {}
        }
        // Fallback: download
        downloadPassport(dataUrl);
      }, "image/png");
    } else {
      // Desktop: download directly
      downloadPassport(dataUrl);
    }
  } catch(e) {
    if (btn) { btn.textContent = "Salva immagine / Condividi"; btn.disabled = false; }
    const t = document.getElementById("share-toast");
    if (t) { t.textContent = "Errore generazione immagine"; t.classList.add("visible"); setTimeout(() => { t.classList.remove("visible"); t.textContent = "Copiato negli appunti"; }, 2500); }
  }
}

function downloadPassport(dataUrl) {
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = "flight-log-passport.png";
  a.click();
  const t = document.getElementById("share-toast");
  if (t) { t.textContent = "Immagine salvata!"; t.classList.add("visible"); setTimeout(() => { t.classList.remove("visible"); t.textContent = "Copiato negli appunti"; }, 2500); }
}

// Boot
boot();

</script>
