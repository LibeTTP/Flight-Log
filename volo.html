<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#100d08;color:#e6dfd0;font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;background-image:linear-gradient(rgba(212,162,78,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(212,162,78,.025) 1px,transparent 1px);background-size:40px 40px}
input,button,select{font-family:inherit}
input[type="date"],input[type="time"],input[type="number"],input[type="email"],input[type="password"]{color-scheme:dark}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:#14110b;border:1px solid #2a2419;padding:40px 32px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:24px}
.auth-brand{font-family:'Instrument Serif',serif;font-size:36px;font-style:italic;color:#f0e9d8;text-align:center}
.auth-brand span{color:#d4a24e;font-style:normal}
.auth-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6b6558;text-align:center}
.auth-tabs{display:flex;border-bottom:1px solid #2a2419}
.auth-tab{flex:1;background:none;border:none;color:#6b6558;padding:10px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;position:relative}
.auth-tab.active{color:#d4a24e}
.auth-tab.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:#d4a24e}
.auth-fields{display:flex;flex-direction:column;gap:12px}
.auth-field label{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#6b6558;margin-bottom:6px}
.auth-field input{width:100%;background:#0a0806;border:1px solid #2a2419;color:#e6dfd0;padding:12px;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.auth-field input:focus{border-color:#d4a24e}
.auth-field input::placeholder{color:#4a463d}
.auth-error{color:#e57548;background:#1a0f0a;border-left:2px solid #e57548;padding:10px 14px;font-size:12px}
.auth-msg{color:#d4a24e;background:#1a150a;border-left:2px solid #d4a24e;padding:10px 14px;font-size:12px}
.btn-auth{background:#d4a24e;border:none;color:#100d08;padding:14px;font-weight:600;font-size:12px;cursor:pointer;letter-spacing:.2em;text-transform:uppercase;width:100%;font-family:'JetBrains Mono',monospace;transition:background .15s}
.btn-auth:hover{background:#e5b26b}
.btn-auth:disabled{background:#4a3a1a;color:#6b5a30;cursor:not-allowed}

/* APP */
.header{background:linear-gradient(180deg,#14110b 0%,#100d08 100%);border-bottom:1px solid #2a2419;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100}
.brand{font-family:'Instrument Serif',serif;font-size:26px;font-style:italic;color:#f0e9d8;line-height:1}
.brand-mark{color:#d4a24e;font-style:normal;margin-right:4px}
.header-right{display:flex;align-items:center;gap:12px}
.header-stat{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#6b6558;text-align:right;line-height:1.6}
.header-stat-val{color:#d4a24e;font-weight:500}
.btn-logout{background:none;border:1px solid #2a2419;color:#6b6558;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 10px;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.btn-logout:hover{border-color:#d4a24e;color:#d4a24e}
.sync-indicator{width:6px;height:6px;border-radius:50%;background:#4a463d;flex-shrink:0;transition:background .3s}
.sync-indicator.syncing{background:#d4a24e;animation:pulse 1s infinite}
.sync-indicator.ok{background:#5a9a5a}
.sync-indicator.error{background:#e57548}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{padding:4px 20px 0;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #2a2419;background:#100d08;position:sticky;top:73px;z-index:90}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;color:#6b6558;padding:12px 18px;font-size:11px;text-transform:uppercase;letter-spacing:.15em;cursor:pointer;font-weight:500;white-space:nowrap;position:relative;transition:color .15s}
.tab:hover{color:#a89f8c}
.tab.active{color:#d4a24e}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:2px;background:#d4a24e}

.content{padding:20px 20px 60px}

#globe{width:100%;height:540px;overflow:hidden;border:1px solid #2a2419;background:radial-gradient(ellipse at center,#0a0806 0%,#030201 100%);position:relative;cursor:grab;touch-action:none}
#globe:active{cursor:grabbing}
#globe canvas{display:block}
.globe-hint{position:absolute;bottom:12px;left:14px;color:#4a463d;font-size:10px;letter-spacing:.15em;text-transform:uppercase;pointer-events:none;z-index:5}
.globe-hint::before{content:'· ';color:#d4a24e}
.globe-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#d4a24e;font-size:11px;letter-spacing:.2em;text-transform:uppercase;z-index:3}
.airport-info{position:absolute;background:#14110bee;border:1px solid #4a463d;padding:12px 16px;color:#e6dfd0;font-size:12px;pointer-events:none;z-index:20;backdrop-filter:blur(10px);box-shadow:0 4px 24px #000c;max-width:240px;display:none;transform:translate(-50%,calc(-100% - 14px));line-height:1.4}
.airport-info.visible{display:block}
.airport-info-iata{color:#d4a24e;font-weight:500;font-size:14px;letter-spacing:.15em}
.airport-info-city{margin-top:4px;font-family:'Instrument Serif',serif;font-size:17px;color:#f0e9d8;font-style:italic}
.airport-info-name{color:#6b6558;font-size:10px;margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.airport-info-visits{color:#d4a24e;font-size:10px;margin-top:8px;padding-top:8px;border-top:1px solid #2a2419;letter-spacing:.1em;text-transform:uppercase}
.airport-info::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#4a463d}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;margin-top:24px;background:#2a2419;border:1px solid #2a2419}
.stat{background:#14110b;padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.stat-value{color:#f0e9d8;font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;line-height:1;letter-spacing:-.02em}
.stat-value .unit{color:#d4a24e;font-size:14px;margin-left:4px;font-style:italic;font-family:'Instrument Serif',serif}
.stat-label{color:#6b6558;font-size:10px;text-transform:uppercase;letter-spacing:.15em}
.stat-sub{color:#4a463d;font-size:10px;letter-spacing:.05em}

.card{background:#14110b;border:1px solid #2a2419;padding:22px;margin-top:20px}
.card h3{color:#6b6558;font-size:10px;text-transform:uppercase;letter-spacing:.2em;margin-bottom:18px;font-weight:500;padding-bottom:10px;border-bottom:1px solid #2a2419}

.form{display:flex;flex-direction:column;gap:18px}
.form h2{font-family:'Instrument Serif',serif;font-size:24px;font-weight:400;font-style:italic;color:#f0e9d8;margin-bottom:4px;letter-spacing:-.02em}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-field{flex:1;min-width:100px;position:relative}
.form-field label{color:#6b6558;font-size:10px;text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px;display:block;font-weight:500}
.form input,.form select{width:100%;background:#0a0806;border:1px solid #2a2419;color:#e6dfd0;padding:11px 12px;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.form input:focus{border-color:#d4a24e}
.form input::placeholder{color:#4a463d}
.btn-primary{background:#d4a24e;border:none;color:#100d08;padding:14px;font-weight:600;font-size:12px;cursor:pointer;letter-spacing:.2em;text-transform:uppercase;width:100%;font-family:'JetBrains Mono',monospace;transition:background .15s}
.btn-primary:hover{background:#e5b26b}
.btn-primary:active{transform:translateY(1px)}
.preview{background:#0a0806;border-left:2px solid #d4a24e;padding:12px 16px;color:#d4a24e;font-size:12px;letter-spacing:.05em}
.preview strong{color:#f0e9d8;font-weight:600}
.error{color:#e57548;background:#1a0f0a;border-left:2px solid #e57548;padding:12px 16px;font-size:12px}

.suggestions{position:absolute;top:100%;left:0;right:0;background:#14110b;border:1px solid #2a2419;margin-top:2px;z-index:50;box-shadow:0 8px 24px #000d;max-height:260px;overflow-y:auto}
.suggestion{padding:10px 14px;cursor:pointer;display:flex;gap:12px;align-items:center;font-size:12px;border-bottom:1px solid #201c14}
.suggestion:last-child{border-bottom:none}
.suggestion:hover{background:#1c1810}
.suggestion-iata{color:#d4a24e;font-weight:500;width:42px;letter-spacing:.1em}
.suggestion-city{color:#a89f8c;font-size:12px}

.sort-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:0;padding-bottom:12px;border-bottom:1px solid #2a2419;flex-wrap:wrap;gap:8px}
.sort-count{color:#6b6558;font-size:10px;text-transform:uppercase;letter-spacing:.2em}
.sort-count strong{color:#d4a24e}
.sort-select{background:transparent;border:1px solid #2a2419;color:#a89f8c;padding:6px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}

.flight-row{background:#14110b;border:1px solid #2a2419;padding:18px 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:-1px;transition:background .15s}
.flight-row:hover{background:#17140d}
.flight-num{color:#d4a24e;font-weight:500;font-size:13px;letter-spacing:.15em}
.flight-date{color:#6b6558;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.airport-code{color:#f0e9d8;font-family:'Instrument Serif',serif;font-weight:400;font-size:26px;letter-spacing:.03em;line-height:1}
.airport-city{color:#6b6558;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.flight-route{flex:1;display:flex;align-items:center;gap:14px;min-width:240px}
.route-side{min-width:60px}
.route-line{flex:1;border-top:1px dashed #4a463d;position:relative;text-align:center}
.route-plane{position:absolute;top:-8px;left:50%;transform:translateX(-50%);color:#d4a24e;background:#14110b;padding:0 6px;font-size:13px}
.route-duration{color:#d4a24e;font-size:10px;margin-top:10px;letter-spacing:.15em}
.flight-time{color:#a89f8c;font-size:11px;margin-top:4px;letter-spacing:.05em}
.flight-meta{text-align:center}
.flight-meta-val{font-size:13px;color:#e6dfd0;letter-spacing:.05em}
.flight-meta-lbl{color:#4a463d;font-size:9px;text-transform:uppercase;letter-spacing:.15em;margin-top:3px}
.btn-delete{background:none;border:none;color:#4a463d;font-size:18px;cursor:pointer;padding:6px 10px;transition:color .15s}
.btn-delete:hover{color:#e57548}

.empty{text-align:center;padding:60px 20px;color:#6b6558;font-size:13px}
.empty-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#a89f8c;margin-bottom:8px}

.bar-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.bar-iata{color:#d4a24e;font-weight:500;width:44px;font-size:12px;letter-spacing:.1em}
.bar-container{flex:1}
.bar-label{color:#a89f8c;margin-bottom:5px;font-family:'Instrument Serif',serif;font-style:italic;font-size:14px}
.bar-track{background:#201c14;height:4px;overflow:hidden}
.bar-fill{background:linear-gradient(90deg,#d4a24e,#e5b26b);height:100%}
.bar-count{color:#e6dfd0;font-size:12px;font-weight:500;width:30px;text-align:right}
.chip{background:transparent;border:1px solid #2a2419;padding:8px 14px}
.chip-code{color:#d4a24e;font-weight:500;letter-spacing:.1em;font-size:12px}
.chip-count{color:#6b6558;font-size:11px;margin-left:10px}

/* PASSPORT */
.passport-wrap{max-width:480px;margin:0 auto;padding-bottom:32px}
.passport-share-btn{display:block;width:100%;background:none;border:1px solid #2a2419;color:#6b6558;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:10px;cursor:pointer;margin-bottom:24px;transition:all .15s}
.passport-share-btn:hover{border-color:#d4a24e;color:#d4a24e}
.passport{background:#4a1942;color:#f5e6c8;font-family:'JetBrains Mono',monospace;position:relative;overflow:hidden;box-shadow:0 20px 60px #00000088;display:flex;flex-direction:column}
.passport::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(212,162,78,.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,162,78,.06) 0%,transparent 50%),repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(212,162,78,.025) 18px,rgba(212,162,78,.025) 19px);pointer-events:none}
.passport-cover{padding:32px 28px 24px;border-bottom:1px solid rgba(212,162,78,.2);display:flex;flex-direction:column;align-items:center;gap:10px;position:relative}
.passport-emblem{width:52px;height:52px;border:2px solid rgba(212,162,78,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(212,162,78,.8);background:rgba(212,162,78,.06)}
.passport-title{font-family:'Instrument Serif',serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:rgba(212,162,78,.7);text-align:center}
.passport-name{font-family:'Instrument Serif',serif;font-size:26px;font-style:italic;color:#f5e6c8;text-align:center;letter-spacing:-.01em}
.passport-subtitle{font-size:9px;letter-spacing:.25em;color:rgba(212,162,78,.5);text-transform:uppercase}
.passport-body{flex:1;padding:20px 28px;display:flex;flex-direction:column;gap:0}
.passport-stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px solid rgba(212,162,78,.1)}
.passport-stat-row:last-of-type{border-bottom:none}
.passport-stat-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(212,162,78,.5)}
.passport-stat-value{font-family:'Instrument Serif',serif;font-size:20px;font-style:italic;color:#f5e6c8}
.passport-stat-unit{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(212,162,78,.6);margin-left:5px;font-style:normal}
.passport-countries{padding:16px 0 0;margin-top:4px}
.passport-countries-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(212,162,78,.5);margin-bottom:10px}
.passport-flags{display:flex;flex-wrap:wrap;gap:6px;font-size:22px;line-height:1}
.passport-stamps{padding:16px 0 0}
.passport-stamps-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(212,162,78,.5);margin-bottom:10px}
.passport-stamp-grid{display:flex;flex-wrap:wrap;gap:6px}
.passport-stamp{border:1px solid rgba(212,162,78,.3);padding:5px 10px;font-size:11px;letter-spacing:.1em;color:rgba(212,162,78,.7);position:relative}
.passport-stamp::before{content:'';position:absolute;inset:2px;border:1px solid rgba(212,162,78,.1);pointer-events:none}
.passport-mrz{background:rgba(0,0,0,.25);padding:14px 28px;font-size:9px;letter-spacing:.15em;color:rgba(212,162,78,.35);line-height:1.8;border-top:1px solid rgba(212,162,78,.1);word-break:break-all}

.share-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#d4a24e;color:#100d08;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:10px 20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.share-toast.visible{opacity:1}


</style>

function haversine(lat1,lon1,lat2,lon2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function estimateDur(km){let s;if(km<300)s=500;else if(km<800)s=680;else if(km<2500)s=790;else if(km<6000)s=850;else s=870;return Math.round((km/s)*60)+25;}
function calcDur(dep,arr){if(!dep||!arr)return null;const[dh,dm]=dep.split(":").map(Number),[ah,am]=arr.split(":").map(Number);let m=(ah*60+am)-(dh*60+dm);if(m<0)m+=1440;return m;}
function gcPts(lat1,lon1,lat2,lon2,n){n=n||80;const r=d=>d*Math.PI/180,g=r=>r*180/Math.PI;const f1=r(lat1),l1=r(lon1),f2=r(lat2),l2=r(lon2);const d=2*Math.asin(Math.sqrt(Math.sin((f2-f1)/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin((l2-l1)/2)**2));if(d===0)return[[lat1,lon1]];const pts=[];for(let i=0;i<=n;i++){const t=i/n,A=Math.sin((1-t)*d)/Math.sin(d),B=Math.sin(t*d)/Math.sin(d);const x=A*Math.cos(f1)*Math.cos(l1)+B*Math.cos(f2)*Math.cos(l2);const y=A*Math.cos(f1)*Math.sin(l1)+B*Math.cos(f2)*Math.sin(l2);const z=A*Math.sin(f1)+B*Math.sin(f2);pts.push([g(Math.atan2(z,Math.sqrt(x*x+y*y))),g(Math.atan2(y,x))]);}return pts;}

  try {
    setSync("syncing");
    const rows = await supa.getFlights();
    state.flights = rows.map(fromRow);
    setSync("ok");
  } catch(e) {
    setSync("error");
  }
}

function setSync(s) {
  state.syncState = s;
  const el = document.getElementById("sync-dot");
  if (el) { el.className = "sync-indicator " + s; }
}

// ── GLOBE ─────────────────────────────────────────────────────────────────────
class Globe {
  constructor(container) {
    this.container = container; this.overlays = []; this.airportMeshes = []; this.rotVel = {x:0,y:0}; this.dragging = false; this.zoom = 2.8;
    this._init();
  }
  _init() {
    const W=this.container.clientWidth, H=this.container.clientHeight;
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45,W/H,0.1,1000);
    this.camera.position.z = this.zoom;
    this.renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
    this.renderer.setSize(W,H); this.renderer.setPixelRatio(Math.min(devicePixelRatio,2)); this.renderer.setClearColor(0,0);
    this.container.appendChild(this.renderer.domElement);
    this.scene.add(new THREE.AmbientLight(0xffffff,0.4));
    const sun=new THREE.DirectionalLight(0xffffff,0.8); sun.position.set(5,3,5); this.scene.add(sun);
    const mat=new THREE.MeshPhongMaterial({color:0x1a3050,specular:new THREE.Color(0x2a4a6a),shininess:8});
    const loader=new THREE.TextureLoader(); loader.crossOrigin="anonymous";
    const urls=["https://unpkg.com/three-globe@2.41.7/example/img/earth-blue-marble.jpg","https://cdn.jsdelivr.net/npm/three-globe@2.41.7/example/img/earth-blue-marble.jpg","https://unpkg.com/three-globe@2.41.7/example/img/earth-dark.jpg"];
    const tryLoad=i=>{if(i>=urls.length){document.getElementById("globe-loading")&&document.getElementById("globe-loading").remove();return;}loader.load(urls[i],tex=>{mat.map=tex;mat.color=new THREE.Color(0xffffff);mat.needsUpdate=true;document.getElementById("globe-loading")&&document.getElementById("globe-loading").remove();},undefined,()=>tryLoad(i+1));};
    tryLoad(0);
    this.globe=new THREE.Mesh(new THREE.SphereGeometry(1,96,96),mat); this.globe.rotation.y=-0.16; this.globe.rotation.x=0.4; this.scene.add(this.globe);
    const atmMat=new THREE.ShaderMaterial({vertexShader:"varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",fragmentShader:"varying vec3 vN;void main(){float i=pow(0.7-dot(vN,vec3(0,0,1)),3.5);gl_FragColor=vec4(0.83,0.63,0.30,1.0)*i;}",blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true});
    this.scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.025,96,96),atmMat));
    const sv=[];for(let i=0;i<4000;i++){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=80+Math.random()*20;sv.push(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));}
    const sg=new THREE.BufferGeometry(); sg.setAttribute("position",new THREE.Float32BufferAttribute(sv,3));
    this.scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.15,transparent:true,opacity:0.8})));
    this._setupInteraction(); this._animate();
  }
  _setupInteraction() {
    const dom=this.renderer.domElement; let prev={x:0,y:0},dn={x:0,y:0},moved=false;
    const onDown=(x,y)=>{this.dragging=true;prev={x,y};dn={x,y};moved=false;this.rotVel={x:0,y:0};};
    const onMove=(x,y)=>{if(!this.dragging)return;if(Math.hypot(x-dn.x,y-dn.y)>5)moved=true;const dx=x-prev.x,dy=y-prev.y;this.globe.rotation.y+=dx*0.003;this.globe.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,this.globe.rotation.x+dy*0.003));this.rotVel={x:dy*0.003,y:dx*0.003};prev={x,y};};
    const onUp=(x,y)=>{if(this.dragging&&!moved&&x!==undefined)this._pick(x,y);else if(moved)hideAirportInfo();this.dragging=false;};
    dom.addEventListener("mousedown",e=>onDown(e.clientX,e.clientY));
    window.addEventListener("mousemove",e=>onMove(e.clientX,e.clientY));
    window.addEventListener("mouseup",e=>onUp(e.clientX,e.clientY));
    dom.addEventListener("wheel",e=>{e.preventDefault();this.zoom=Math.max(1.4,Math.min(8,this.zoom+e.deltaY*0.002));this.camera.position.z=this.zoom;},{passive:false});
    let pinch=null;
    dom.addEventListener("touchstart",e=>{if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch={dist:Math.hypot(dx,dy),zoom:this.zoom};this.dragging=false;}},{passive:true});
    dom.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===1&&!pinch)onMove(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2&&pinch){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;this.zoom=Math.max(1.4,Math.min(8,pinch.zoom*(pinch.dist/Math.hypot(dx,dy))));this.camera.position.z=this.zoom;}},{passive:false});
    dom.addEventListener("touchend",e=>{const t=e.changedTouches[0];onUp(t&&t.clientX,t&&t.clientY);pinch=null;});
    window.addEventListener("resize",()=>this.resize());
  }
  _animate(){this._raf=requestAnimationFrame(()=>this._animate());if(!this.dragging){this.globe.rotation.y+=this.rotVel.y*0.92;this.globe.rotation.x=Math.max(-Math.PI/2,Math.min(Math.PI/2,this.globe.rotation.x+this.rotVel.x*0.92));this.rotVel.x*=0.92;this.rotVel.y*=0.92;}this.renderer.render(this.scene,this.camera);}
  resize(){if(!this.container.isConnected)return;const W=this.container.clientWidth,H=this.container.clientHeight;this.camera.aspect=W/H;this.camera.updateProjectionMatrix();this.renderer.setSize(W,H);}
  _ll(lat,lon,r){r=r||1;const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));}
  setFlights(flights) {
    this.overlays.forEach(o=>this.globe.remove(o)); this.overlays=[]; this.airportMeshes=[];
    const visited=new Set(flights.flatMap(f=>[f.origin,f.destination]));
    const pickGeo=new THREE.SphereGeometry(0.028,8,8),pickMat=new THREE.MeshBasicMaterial({visible:false});
    Object.entries(AIRPORTS).forEach(([iata,ap])=>{
      if(!visited.has(iata))return;
      const ring=new THREE.Mesh(new THREE.SphereGeometry(0.012,12,12),new THREE.MeshBasicMaterial({color:0xffffff}));
      ring.position.copy(this._ll(ap.lat,ap.lon,1.003)); this.globe.add(ring); this.overlays.push(ring);
      const dot=new THREE.Mesh(new THREE.SphereGeometry(0.009,12,12),new THREE.MeshBasicMaterial({color:0xd4a24e}));
      dot.position.copy(this._ll(ap.lat,ap.lon,1.008)); this.globe.add(dot); this.overlays.push(dot);
      const glow=new THREE.Mesh(new THREE.SphereGeometry(0.020,12,12),new THREE.MeshBasicMaterial({color:0xd4a24e,transparent:true,opacity:0.25}));
      glow.position.copy(this._ll(ap.lat,ap.lon,1.005)); this.globe.add(glow); this.overlays.push(glow);
      const pick=new THREE.Mesh(pickGeo,pickMat); pick.position.copy(this._ll(ap.lat,ap.lon,1.005)); pick.userData.iata=iata;
      this.globe.add(pick); this.overlays.push(pick); this.airportMeshes.push(pick);
    });
    const rc={};
    flights.forEach(f=>{const k=[f.origin,f.destination].sort().join("-");rc[k]=(rc[k]||0)+1;});
    Object.entries(rc).forEach(([key,count])=>{
      const[a,b]=key.split("-"),ap1=AIRPORTS[a],ap2=AIRPORTS[b]; if(!ap1||!ap2)return;
      const pts=gcPts(ap1.lat,ap1.lon,ap2.lat,ap2.lon,80),arcPts=[];
      for(let i=0;i<pts.length;i++){const t=i/(pts.length-1),h=Math.sin(Math.PI*t)*0.04;arcPts.push(this._ll(pts[i][0],pts[i][1],1.01+h));}
      const op=Math.min(0.9+count*0.05,1);
      [0,0.0015,-0.0015,0.0008,-0.0008].forEach((off,i)=>{
        const ps=arcPts.map(p=>p.clone().normalize().multiplyScalar(p.length()+off));
        const g=new THREE.BufferGeometry().setFromPoints(ps);
        const m=new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:i===0?op:op*0.5});
        const l=new THREE.Line(g,m); this.globe.add(l); this.overlays.push(l);
      });
    });
  }
  _pick(cx,cy){
    const rect=this.renderer.domElement.getBoundingClientRect();
    const mouse=new THREE.Vector2(((cx-rect.left)/rect.width)*2-1,-((cy-rect.top)/rect.height)*2+1);
    const rc=new THREE.Raycaster(); rc.setFromCamera(mouse,this.camera);
    const hits=rc.intersectObjects(this.airportMeshes,false); if(!hits.length){hideAirportInfo();return;}
    const front=hits.filter(h=>{const wp=new THREE.Vector3();h.object.getWorldPosition(wp);return wp.normalize().dot(new THREE.Vector3().subVectors(this.camera.position,h.point).normalize())>0;});
    if(!front.length){hideAirportInfo();return;}
    showAirportInfo(front[0].object.userData.iata,cx,cy);
  }
}

        (!isLogin&&!isReset ? '<div style="color:#4a463d;font-size:10px;text-align:center;letter-spacing:.05em;line-height:1.6">Registrandoti accetti di usare questa app solo per uso personale.</div>' : "") +

async function submitAuth() {
  const btn = document.getElementById("auth-btn");
  const msg = document.getElementById("auth-msg");
  const email = (document.getElementById("auth-email")||{}).value||"";
  const pass = (document.getElementById("auth-pass")||{}).value||"";
  if (!email) { msg.innerHTML = '<div class="auth-error">Inserisci la tua email</div>'; return; }
  btn.disabled = true; btn.textContent = "..."; msg.innerHTML = "";
  try {
    if (state.authTab === "reset") {
      await supa.resetPassword(email);
      msg.innerHTML = '<div class="auth-msg">Email inviata! Controlla la casella e clicca il link per reimpostare la password.</div>';
      btn.disabled = false; btn.textContent = "Invia email reset"; return;
    }
    if (!pass) { msg.innerHTML = '<div class="auth-error">Inserisci la password</div>'; btn.disabled=false; btn.textContent=state.authTab==="login"?"Accedi":"Crea account"; return; }
    if (state.authTab === "signup") {
      msg.innerHTML = '<div class="auth-msg" style="color:#a89f8c">Contatto Supabase...</div>';
      const r = await fetch(SUPA_URL + "/auth/v1/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPA_KEY },
        body: JSON.stringify({ email, password: pass })
      });
      const d = await r.json();
      msg.innerHTML = '<div class="auth-msg" style="color:#a89f8c;font-size:10px;word-break:break-all">Risposta: ' + JSON.stringify(d).slice(0,300) + '</div>';
      if (d.error || d.msg) throw new Error(d.error_description || d.error || d.msg || "Errore registrazione");
      msg.innerHTML = '<div class="auth-msg">Registrazione avvenuta! Controlla la tua email e clicca il link per confermare l\'account, poi accedi.</div>';
      btn.disabled = false; btn.textContent = "Crea account"; return;
    }
    await supa.signIn(email, pass);
    state.user = supa._user;
    await loadFlights();
    state.tab = "map";
    render();
  } catch(e) {
    msg.innerHTML = '<div class="auth-error">ERRORE: ' + e.message + '</div>';
    btn.disabled = false; btn.textContent = state.authTab === "login" ? "Accedi" : "Crea account";
  }
}

  document.getElementById("root").innerHTML =
    '<div class="header">' +
      '<div class="brand"><span class="brand-mark">&#9674;</span>flight log</div>' +

      '</div>' +

    '<div class="tabs">'+tabs.map(t=>'<button class="tab'+(state.tab===t?" active":"")+'" onclick="setTab(\''+t+'\')">'+labels[t]+'</button>').join("")+'</div>' +
    '<div class="content">'+body+'</div>' +

  if(state.tab==="map"){
    const c=document.getElementById("globe");
    if(c&&!globe){globe=new Globe(c);}

async function doLogout() {
  supa.signOut(); state.user=null; state.flights=[];
  if(globe){globe.renderer.dispose();globe=null;}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function statCard(label,value,unit,sub){return '<div class="stat"><div class="stat-value">'+value+(unit?'<span class="unit">'+unit+'</span>':'')+'</div><div class="stat-label">'+label+'</div>'+(sub?'<div class="stat-sub">'+sub+'</div>':'')+'</div>';}

function renderMap(totalKm,totalMin,airports,countries){
  const empty=state.flights.length===0;
  return '<div id="globe"><div class="globe-hint">trascina per ruotare &mdash; scroll/pinch per zoom</div><div id="globe-loading" class="globe-loading">Loading Earth</div><div id="airport-info" class="airport-info"></div></div>' +
  (empty?'<div class="empty"><div class="empty-title">Nessun volo registrato</div><div>Aggiungi il primo per iniziare</div><button class="btn-primary" style="max-width:220px;margin-top:24px" onclick="setTab(\'add\')">Nuovo volo</button></div>':
  '<div class="stats-grid">'+statCard("Voli totali",state.flights.length)+statCard("Distanza",Math.round(totalKm).toLocaleString("it-IT"),"km")+statCard("Tempo di volo",totalMin?Math.floor(totalMin/60):"&#8212;",totalMin?"h "+String(totalMin%60)+"m":"")+statCard("Aeroporti",airports.size)+statCard("Paesi",countries.size)+'</div>');
}

function renderList(){
  if(!state.flights.length)return'<div class="empty"><div class="empty-title">Log vuoto</div><a href="#" onclick="setTab(\'add\');return false" style="color:#d4a24e;text-decoration:none;border-bottom:1px solid #d4a24e">registra il primo volo &rarr;</a></div>';
  const sorted=[...state.flights].sort((a,b)=>{if(state.sortBy==="date-desc")return b.date.localeCompare(a.date);if(state.sortBy==="date-asc")return a.date.localeCompare(b.date);if(state.sortBy==="distance")return(b.distanceKm||0)-(a.distanceKm||0);if(state.sortBy==="delay")return(b.delay||0)-(a.delay||0);return 0;});
  return '<div class="sort-bar"><span class="sort-count"><strong>'+String(state.flights.length).padStart(3,"0")+'</strong> voli</span><select class="sort-select" onchange="setSortBy(this.value)"><option value="date-desc"'+(state.sortBy==="date-desc"?" selected":"")+'>Data &darr;</option><option value="date-asc"'+(state.sortBy==="date-asc"?" selected":"")+'>Data &uarr;</option><option value="distance"'+(state.sortBy==="distance"?" selected":"")+'>Distanza &darr;</option><option value="delay"'+(state.sortBy==="delay"?" selected":"")+'>Ritardo &darr;</option></select></div>'+sorted.map(renderFlightRow).join("");
}

function renderFlightRow(f){
  const ap1=AIRPORTS[f.origin],ap2=AIRPORTS[f.destination];
  const dh=f.durationMin!=null?Math.floor(f.durationMin/60):null,dm=f.durationMin!=null?f.durationMin%60:null;
  const dt=f.date?new Date(f.date).toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase():"";
  return '<div class="flight-row">'+
    '<div style="min-width:80px"><div class="flight-num">'+(f.flightNum||"&#8212;")+'</div><div class="flight-date">'+dt+'</div></div>'+
    '<div class="flight-route"><div class="route-side"><div class="airport-code">'+f.origin+'</div><div class="airport-city">'+(ap1&&ap1.city||"")+'</div>'+(f.depTime?'<div class="flight-time">'+f.depTime+'</div>':"")+  '</div><div class="route-line"><span class="route-plane">&rarr;</span>'+(dh!==null?'<div class="route-duration">'+dh+'h '+String(dm).padStart(2,"0")+'m'+(f.durationEstimated?' <span style="color:#4a463d;font-size:9px">~</span>':'')+'</div>':"")+  '</div><div class="route-side"><div class="airport-code">'+f.destination+'</div><div class="airport-city">'+(ap2&&ap2.city||"")+'</div>'+(f.arrTime?'<div class="flight-time">'+f.arrTime+'</div>':"")+  '</div></div>'+
    '<div style="display:flex;gap:16px"><div class="flight-meta"><div class="flight-meta-val">'+(f.distanceKm&&f.distanceKm.toLocaleString("it-IT")||"")+'</div><div class="flight-meta-lbl">km</div></div>'+(f.delay>0?'<div class="flight-meta"><div class="flight-meta-val" style="color:#e57548">+'+f.delay+'\'</div><div class="flight-meta-lbl">ritardo</div></div>':"")+  (f.aircraft?'<div class="flight-meta"><div class="flight-meta-val" style="color:#a89f8c">'+f.aircraft+'</div><div class="flight-meta-lbl">tipo</div></div>':"")+  '</div>'+
    '<button class="btn-delete" onclick="doDeleteFlight('+f.id+')">&times;</button></div>';
}

function renderStats(totalKm,totalMin,totalDelay,airports,countries){
  if(!state.flights.length)return'<div class="empty"><div class="empty-title">Nessuna statistica</div><div>Aggiungi voli per iniziare</div></div>';
  const acnt=state.flights.flatMap(f=>[f.origin,f.destination]).reduce((a,x)=>{a[x]=(a[x]||0)+1;return a;},{});
  const top5=Object.entries(acnt).sort((a,b)=>b[1]-a[1]).slice(0,5),mx=top5[0]&&top5[0][1]||1;
  const acMap=state.flights.filter(f=>f.aircraft).reduce((a,f)=>{a[f.aircraft]=(a[f.aircraft]||0)+1;return a;},{});
  const topAC=Object.entries(acMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const routes=new Set(state.flights.map(f=>[f.origin,f.destination].sort().join("-"))).size;
  return'<div class="stats-grid">'+statCard("Voli totali",state.flights.length)+statCard("Distanza",Math.round(totalKm).toLocaleString("it-IT"),"km")+statCard("Tempo di volo",totalMin?Math.floor(totalMin/60):"&#8212;",totalMin?"h":"",(totalMin?totalMin+" minuti":""))+statCard("Aeroporti",airports.size)+statCard("Paesi",countries.size)+statCard("Rotte uniche",routes)+statCard("Ritardo cumulato",totalDelay>0?Math.floor(totalDelay/60):"0",totalDelay>0?"h "+String(totalDelay%60)+"m":"",state.flights.filter(f=>f.delay>0).length+" voli")+statCard("Distanza media",Math.round(totalKm/state.flights.length).toLocaleString("it-IT"),"km")+'</div>'+
  (top5.length?'<div class="card"><h3>Aeroporti pi&ugrave; frequentati</h3>'+top5.map(([iata,cnt])=>'<div class="bar-row"><span class="bar-iata">'+iata+'</span><div class="bar-container"><div class="bar-label">'+(AIRPORTS[iata]&&AIRPORTS[iata].city||iata)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+((cnt/mx)*100)+'%"></div></div></div><span class="bar-count">'+cnt+'</span></div>').join("")+'</div>':"")+(topAC.length?'<div class="card"><h3>Aeromobili volati</h3><div style="display:flex;gap:8px;flex-wrap:wrap">'+topAC.map(([ac,cnt])=>'<div class="chip"><span class="chip-code">'+ac+'</span><span class="chip-count">&times;'+cnt+'</span></div>').join("")+'</div></div>':"");
}

function renderPassport(totalKm,totalMin,airports,countries){
  if(!state.flights.length)return'<div class="empty"><div class="empty-title">Nessun volo registrato</div><div>Aggiungi voli per generare il passaporto</div></div>';
  const th=totalMin?Math.floor(totalMin/60):0,tm=totalMin?totalMin%60:0;
  const routes=new Set(state.flights.map(f=>[f.origin,f.destination].sort().join("-"))).size;
  const flags=[...new Set(state.flights.flatMap(f=>[AIRPORTS[f.origin]&&AIRPORTS[f.origin].country,AIRPORTS[f.destination]&&AIRPORTS[f.destination].country].filter(Boolean)))].map(c=>FLAG[c]||"").filter(Boolean);
  const stamps=[...new Set(state.flights.flatMap(f=>[f.origin,f.destination]))].slice(0,16);
  const pad=(s,n)=>String(s).toUpperCase().replace(/[^A-Z0-9]/g,"<").padEnd(n,"<").slice(0,n);
  return'<div class="passport-wrap"><button class="passport-share-btn" onclick="sharePassport()">Salva immagine / Condividi</button><div class="passport" id="passport-card"><div class="passport-cover"><div class="passport-emblem">&#9674;</div><div class="passport-title">Flight Log &middot; Passaporto Personale</div><div class="passport-name">flight log</div><div class="passport-subtitle">Personal Travel Document &middot; Non ufficiale</div></div><div class="passport-body"><div class="passport-stat-row"><span class="passport-stat-label">Voli effettuati</span><span class="passport-stat-value">'+state.flights.length+'<span class="passport-stat-unit">voli</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Distanza percorsa</span><span class="passport-stat-value">'+Math.round(totalKm).toLocaleString("it-IT")+'<span class="passport-stat-unit">km</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Tempo in volo</span><span class="passport-stat-value">'+th+'h '+String(tm).padStart(2,"0")+'m</span></div><div class="passport-stat-row"><span class="passport-stat-label">Aeroporti visitati</span><span class="passport-stat-value">'+airports.size+'<span class="passport-stat-unit">scali</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Paesi attraversati</span><span class="passport-stat-value">'+countries.size+'<span class="passport-stat-unit">paesi</span></span></div><div class="passport-stat-row"><span class="passport-stat-label">Rotte uniche</span><span class="passport-stat-value">'+routes+'<span class="passport-stat-unit">rotte</span></span></div><div class="passport-countries"><div class="passport-countries-label">Paesi visitati</div><div class="passport-flags">'+flags.join(" ")+'</div></div><div class="passport-stamps"><div class="passport-stamps-label">Scali</div><div class="passport-stamp-grid">'+stamps.map(i=>'<div class="passport-stamp">'+i+'</div>').join("")+'</div></div></div><div class="passport-mrz">'+("P<FLT"+pad("FLIGHT LOG",39))+'<br>'+(pad(state.flights.length+"VLI",9)+"0"+pad(Math.round(totalKm)+"KM",6)+"0"+pad(airports.size+"APT",6)+"0"+pad(countries.size+"CTR",14))+'</div></div></div>';
}

function renderForm(){
  return'<div class="form card"><h2>Registra un nuovo volo</h2><div class="form-row"><div class="form-field"><label>Origine &#9733;</label><input id="f-origin" placeholder="MXP" autocomplete="off" oninput="airportAC(this,\'origin\')" /><div id="sug-origin"></div></div><div class="form-field"><label>Destinazione &#9733;</label><input id="f-destination" placeholder="MAD" autocomplete="off" oninput="airportAC(this,\'destination\')" /><div id="sug-destination"></div></div></div><div id="preview" style="display:none" class="preview"></div><div class="form-row"><div class="form-field"><label>Decollo</label><input type="time" id="f-depTime" oninput="updatePreview()" /></div><div class="form-field"><label>Atterraggio</label><input type="time" id="f-arrTime" oninput="updatePreview()" /></div><div class="form-field"><label>Ritardo (min)</label><input type="number" min="0" id="f-delay" placeholder="0" /></div></div><div class="form-row"><div class="form-field"><label>N&#xB0; Volo</label><input id="f-flightNum" placeholder="AZ203" oninput="detectAirline(this.value)" /></div><div class="form-field"><label>Aeromobile</label><input id="f-aircraft" placeholder="A320" /></div><div class="form-field" style="flex:2"><label>Compagnia</label><input id="f-airline" placeholder="ITA Airways" /></div></div><div class="form-field"><label>Note</label><input id="f-note" placeholder="Sedile finestrino, turbolenza..." /></div><div id="form-error"></div><button class="btn-primary" onclick="submitFlight()">Registra volo</button></div>';
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function showAirportInfo(iata,cx,cy){
  const ap=AIRPORTS[iata];if(!ap)return;
  const el=document.getElementById("airport-info"),container=document.getElementById("globe");
  if(!el||!container)return;
  const rect=container.getBoundingClientRect();
  const visits=state.flights.filter(f=>f.origin===iata||f.destination===iata).length;
  const dep=state.flights.filter(f=>f.origin===iata).length,arr=state.flights.filter(f=>f.destination===iata).length;
  el.innerHTML='<div class="airport-info-iata">'+(FLAG[ap.country]||"")+" "+iata+'</div><div class="airport-info-city">'+ap.city+'</div><div class="airport-info-name">'+ap.name+'</div>'+(visits>0?'<div class="airport-info-visits">'+visits+' '+(visits===1?"volo":"voli")+' &middot; '+dep+' out &middot; '+arr+' in</div>':'<div class="airport-info-visits" style="color:#4a463d">Mai visitato</div>');
  el.style.left=(cx-rect.left)+"px"; el.style.top=(cy-rect.top)+"px"; el.classList.add("visible");
}
function hideAirportInfo(){const el=document.getElementById("airport-info");if(el)el.classList.remove("visible");}

function setTab(t){state.tab=t;if(globe&&globe.renderer.domElement.parentNode)globe.renderer.domElement.remove();renderApp();}
function setSortBy(v){state.sortBy=v;renderApp();}

async function doDeleteFlight(id){
  if(!confirm("Eliminare questo volo?"))return;
  setSync("syncing");
  try{ await supa.deleteFlight(id); state.flights=state.flights.filter(f=>f.id!==id); setSync("ok"); renderApp(); }
  catch(e){ setSync("error"); alert("Errore eliminazione: "+e.message); }
}

function airportAC(input,field){
  const q=input.value.toUpperCase(),sug=document.getElementById("sug-"+field);
  if(q.length<2){sug.innerHTML="";updatePreview();return;}
  const m=Object.entries(AIRPORTS).filter(([iata,ap])=>iata.includes(q)||ap.city.toUpperCase().includes(q)||ap.name.toUpperCase().includes(q)).slice(0,6);
  if(!m.length){sug.innerHTML="";return;}
  sug.innerHTML='<div class="suggestions">'+m.map(([iata,ap])=>'<div class="suggestion" onmousedown="selAP(\''+field+'\',\''+iata+'\')" ontouchstart="selAP(\''+field+'\',\''+iata+'\')"><span class="suggestion-iata">'+iata+'</span><span class="suggestion-city">'+(FLAG[ap.country]||"")+" "+ap.city+" &mdash; "+ap.name+'</span></div>').join("")+'</div>';
  updatePreview();
}
function selAP(field,iata){document.getElementById("f-"+field).value=iata;document.getElementById("sug-"+field).innerHTML="";updatePreview();}
function detectAirline(fn){const d=airlineFromFN(fn),el=document.getElementById("f-airline");if(d&&el&&!el.value)el.value=d;}
function updatePreview(){
  const orig=document.getElementById("f-origin")&&document.getElementById("f-origin").value.toUpperCase();
  const dest=document.getElementById("f-destination")&&document.getElementById("f-destination").value.toUpperCase();
  const dep=document.getElementById("f-depTime")&&document.getElementById("f-depTime").value;
  const arr=document.getElementById("f-arrTime")&&document.getElementById("f-arrTime").value;
  const prev=document.getElementById("preview");if(!prev)return;
  const ap1=AIRPORTS[orig],ap2=AIRPORTS[dest];
  if(ap1&&ap2&&orig!==dest){const km=Math.round(haversine(ap1.lat,ap1.lon,ap2.lat,ap2.lon)),manual=calcDur(dep,arr),est=estimateDur(km),durStr=manual?(Math.floor(manual/60)+"h "+String(manual%60)+"m"):("~"+Math.floor(est/60)+"h "+String(est%60)+'m <span style="color:#6b6558">(stima)</span>');prev.style.display="block";prev.innerHTML="<strong>"+km.toLocaleString("it-IT")+"</strong> km &middot; "+ap1.city+" &rarr; "+ap2.city+" &middot; <strong>"+durStr+"</strong>";}
  else prev.style.display="none";
}
function setupAddForm(){document.addEventListener("click",e=>{if(!e.target.closest(".form-field"))document.querySelectorAll(".suggestions").forEach(s=>s.remove());});}

async function submitFlight(){
  const g=id=>document.getElementById(id)&&document.getElementById(id).value;
  const orig=(g("f-origin")||"").toUpperCase(),dest=(g("f-destination")||"").toUpperCase();
  const err=document.getElementById("form-error");err.innerHTML="";
  if(!orig||!dest){err.innerHTML='<div class="error">Partenza e arrivo sono obbligatori</div>';return;}
  const ap1=AIRPORTS[orig],ap2=AIRPORTS[dest];
  if(!ap1){err.innerHTML='<div class="error">Aeroporto "'+orig+'" non trovato</div>';return;}
  if(!ap2){err.innerHTML='<div class="error">Aeroporto "'+dest+'" non trovato</div>';return;}
  const dep=g("f-depTime")||"",arr=g("f-arrTime")||"",manual=calcDur(dep,arr),dist=Math.round(haversine(ap1.lat,ap1.lon,ap2.lat,ap2.lon));
  const flight={id:Date.now(),flightNum:(g("f-flightNum")||"").toUpperCase(),date:new Date().toISOString().slice(0,10),origin:orig,destination:dest,depTime:dep,arrTime:arr,delay:parseInt(g("f-delay"))||0,aircraft:(g("f-aircraft")||"").toUpperCase(),airline:g("f-airline")||"",note:g("f-note")||"",distanceKm:dist,durationMin:manual||estimateDur(dist),durationEstimated:!manual};
  setSync("syncing");
  try{ await supa.insertFlight(flight); state.flights.unshift(flight); setSync("ok"); setTab("list"); }
  catch(e){ setSync("error"); err.innerHTML='<div class="error">Errore salvataggio: '+e.message+'</div>'; }
}

async function sharePassport() {
  const card = document.getElementById("passport-card");
  if (!card) return;

  const btn = document.querySelector(".passport-share-btn");
  if (btn) { btn.textContent = "Generando immagine..."; btn.disabled = true; }

  // Load html2canvas if not already loaded
  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  try {
    const canvas = await window.html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: "#4a1942",
      logging: false,
    });

    const dataUrl = canvas.toDataURL("image/png");

    if (btn) { btn.textContent = "Salva immagine / Condividi"; btn.disabled = false; }

    // Try native share with file (iOS/Android)
    if (navigator.share && navigator.canShare) {
      canvas.toBlob(async blob => {
        const file = new File([blob], "flight-log-passport.png", { type: "image/png" });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: "flight log — passaporto personale" });
            return;
          } catch(e) {}
        }
        // Fallback: download
        downloadPassport(dataUrl);
      }, "image/png");
    } else {
      // Desktop: download directly
      downloadPassport(dataUrl);
    }
  } catch(e) {
    if (btn) { btn.textContent = "Salva immagine / Condividi"; btn.disabled = false; }
    const t = document.getElementById("share-toast");
    if (t) { t.textContent = "Errore generazione immagine"; t.classList.add("visible"); setTimeout(() => { t.classList.remove("visible"); t.textContent = "Copiato negli appunti"; }, 2500); }
  }
}

function downloadPassport(dataUrl) {
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = "flight-log-passport.png";
  a.click();
  const t = document.getElementById("share-toast");
  if (t) { t.textContent = "Immagine salvata!"; t.classList.add("visible"); setTimeout(() => { t.classList.remove("visible"); t.textContent = "Copiato negli appunti"; }, 2500); }
}

// Boot
boot();

</script>
